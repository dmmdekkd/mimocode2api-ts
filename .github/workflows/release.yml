name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: mimocode2api
            archive: mimocode2api-linux-x64.tar.gz
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: mimocode2api
            archive: mimocode2api-linux-arm64.tar.gz
          - os: macos-latest
            target: bun-darwin-x64
            artifact: mimocode2api
            archive: mimocode2api-mac-x64.tar.gz
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: mimocode2api
            archive: mimocode2api-mac-arm64.tar.gz
          - os: windows-latest
            target: bun-windows-x64
            artifact: mimocode2api.exe
            archive: mimocode2api-win-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build binary (${{ matrix.target }})
        run: bun build src/main.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Copy config template
        shell: bash
        run: |
          mkdir -p bundle
          cp dist/${{ matrix.artifact }} bundle/
          cp config.jsonc bundle/ 2>/dev/null || true
          cp README.md bundle/ 2>/dev/null || true

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        working-directory: bundle
        run: tar -czf ../${{ matrix.archive }} .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        working-directory: bundle
        run: Compress-Archive -Path . -DestinationPath ..\${{ matrix.archive }}

      - name: Compute checksum
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile ${{ matrix.archive }} SHA256 | grep -oE '[a-fA-F0-9]{64}' > ${{ matrix.archive }}.sha256
          else
            shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Publish Release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # Mimocode2API ${{ steps.tag.outputs.name }}

          OpenAI 兼容的反向代理，将小米 MiMo AI（`api.xiaomimimo.com`）包装为 OpenAI API 接口。

          ## 下载说明

          根据你的操作系统和 CPU 架构选择对应文件：

          | 平台 | x64 (Intel/AMD) | ARM64 |
          | --- | --- | --- |
          | Windows | `mimocode2api-win-x64.zip` | - |
          | macOS (Intel) | `mimocode2api-mac-x64.tar.gz` | - |
          | macOS (Apple Silicon) | - | `mimocode2api-mac-arm64.tar.gz` |
          | Linux | `mimocode2api-linux-x64.tar.gz` | `mimocode2api-linux-arm64.tar.gz` |

          下载后无需安装 Bun 或 Node.js，解压后直接运行即可。

          ## 校验文件完整性

          每个压缩包附带 `.sha256` 校验文件，下载后请验证完整性：

          ```bash
          # macOS / Linux
          shasum -a 256 mimocode2api-linux-x64.tar.gz

          # Windows (PowerShell)
          Get-FileHash mimocode2api-win-x64.zip -Algorithm SHA256
          ```

          ## 快速开始

          1. 解压下载的压缩包
          2. 在解压目录运行：
             - Windows: `.\mimocode2api.exe`
             - macOS / Linux: `./mimocode2api`
          3. 首次启动会自动生成 `config.jsonc` 配置文件
          4. 编辑 `config.jsonc` 修改监听端口、模型别名等
          5. 服务默认监听 `http://127.0.0.1:8000`

          ## 使用示例

          ```bash
          # 列出模型
          curl http://127.0.0.1:8000/v1/models

          # 调用对话
          curl -X POST http://127.0.0.1:8000/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"mimo-auto","messages":[{"role":"user","content":"你好"}]}'
          ```

          ## 兼容 OpenAI 客户端

          ```python
          from openai import OpenAI
          client = OpenAI(base_url="http://127.0.0.1:8000/v1", api_key="dummy")
          ```

          ## 完整文档

          详见 [README](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.name }}/README.md)。

          ## 免责声明

          本项目仅供学习研究，使用请遵守 MiMo 服务条款。
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.sha256
          draft: false
          prerelease: false
          make_latest: true
